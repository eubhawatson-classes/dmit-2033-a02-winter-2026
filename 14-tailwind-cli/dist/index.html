<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Join to become a member and enjoy exclusive deals, offers, invites and rewards. Simple sign-up form with email, password, referral and consent.">
    
    <title>Tailwind Sign Up Form</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-200">
    <section class="max-w-md mx-auto bg-white text-gray-700 border-2 border-gray-300 rounded shadow-lg p-6 my-10">
        <!-- Intro -->
        <div class="flex flex-wrap align-items border-b border-gray-300 pb-4 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 text-indigo-600 mr-1 mb-2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0 1 18 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5h6.375c.621 0 1.125.504 1.125 1.125v9.375m-8.25-3 1.5 1.5 3-3.75" />
            </svg>              
            <h1 class="font-medium text-3xl text-indigo-700 mb-2">Sign up</h1>
            <p class="text-lg">Become a member and enjoy exclusive deals, offers, invites, and rewards.</p>
        </div>
        <!-- Sign Up Form -->
        <form action="index.html" method="POST">
            <!-- Email -->
            <div class="mb-4">
                <label for="email" class="block mb-2">Email Address <span class="text-rose-700 font-bold">*</span></label>
                <input type="email" id="email" name="email" class="w-full form-input border-gray-300 shadow-sm rounded focus:border-indigo-700 focus:ring-indigo-700 focus:ring-3" required>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label for="password" class="block mb-2">Password <span class="text-rose-700 font-bold">*</span></label>
                <input type="password" id="password" name="password" aria-describedby="password-help" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).+" class="w-full form-input border-gray-300 shadow-sm rounded focus:border-indigo-700 focus:ring-indigo-700 focus:ring-3" required>
                <p id="password-help" class="text-sm mt-2">Your password must contain at least one lowercase letter, one uppercase letter, and one number.</p>
            </div>

            <!-- Referrals -->
            <div class="mb-4">
                <label for="referral" class="block mb-2">How did you learn about us?</label>
                <select name="referral" id="referral" class="w-full form-select border-gray-300 shadow-sm rounded focus:border-indigo-700 focus:ring-indigo-700 focus:ring-3">
                    <option value="">Please select</option>
                    <option value="search-engine">Search Engine</option>
                    <option value="recommendation">Recommended by a friend</option>
                    <option value="social-media">Social Media</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- Consent -->
            <div class="mb-4">
                <input type="checkbox" id="consent" name="consent" class="form-checkbox rounded border-gray-300 text-indigo-700 focus:ring-indigo-700" required>
                <label for="consent">By signing up, you agree to our Terms of Service and Privacy Policy.</label>
            </div>

            <!-- Submit -->
            <div class="mb-4">
                <input type="submit" name="submit" id="submit" value="Become a Member" class="w-full bg-indigo-700 hover:bg-indigo-600 text-gray-50 transition duration-300 text-lg py-3 rounded mt-4 cursor-pointer">
            </div>
        </form>
    </section>
</body>
</html>
